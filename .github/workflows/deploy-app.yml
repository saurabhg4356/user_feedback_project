name: Deploy Flask App

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-app.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy application files
        run: |
          scp -r app/* ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/feedback-api/

      - name: Install dependencies and restart service
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /opt/feedback-api
            pip3 install -r requirements.txt
            sudo cp feedback.service /etc/systemd/system/feedback.service
            sudo systemctl daemon-reload
            sudo systemctl enable feedback.service
            sudo systemctl restart feedback.service
            sudo systemctl status feedback.service --no-pager
          EOF
